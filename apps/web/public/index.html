<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlowImage</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="pairPanel" class="pair-panel" hidden>
        <h1>FlowImage</h1>
        <div class="pair-actions">
          <button id="generatePair" type="button">Generate Pair Code</button>
          <output id="pairCodeOutput" class="pair-code"></output>
        </div>
        <div class="pair-actions">
          <input id="bindPairCode" type="text" autocomplete="off" placeholder="FIMG-..." />
          <button id="bindPair" type="button">Enter Existing Pair Code</button>
        </div>
        <output id="pairStatus">Loading</output>
        <div id="sessionList" class="session-list"></div>
      </section>
      <section id="annotationPanel" class="annotation-panel">
        <header class="toolbar">
          <button id="prevPage" type="button" aria-label="Previous page">Prev</button>
          <output id="pageStatus">Page 0 / 0</output>
          <button id="nextPage" type="button" aria-label="Next page">Next</button>
          <button id="brushTool" type="button" data-tool="brush">Brush</button>
          <button id="eraserTool" type="button" data-tool="eraser">Eraser</button>
          <label>
            Color
            <input id="colorInput" type="color" value="#ff3040" />
          </label>
          <label>
            Width
            <input id="widthInput" type="range" min="2" max="18" value="5" />
          </label>
          <button id="submitPage" type="button">Submit</button>
          <output id="saveStatus">Loading</output>
        </header>
        <section class="stage" aria-label="Annotation canvas">
          <img id="baseImage" alt="Screenshot to annotate" />
          <canvas id="drawCanvas"></canvas>
        </section>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
